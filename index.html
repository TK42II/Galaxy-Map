        if(x===d.gw-1||!d.grid[y*d.gw+x+1]){ctx2.moveTo(px2+d.cs,py2);ctx2.lineTo(px2+d.cs,py2+d.cs)}
        if(y===0||!d.grid[(y-1)*d.gw+x]){ctx2.moveTo(px2,py2);ctx2.lineTo(px2+d.cs,py2)}
        if(y===d.gh-1||!d.grid[(y+1)*d.gw+x]){ctx2.moveTo(px2,py2+d.cs);ctx2.lineTo(px2+d.cs,py2+d.cs)}
      }
      ctx2.stroke();
      regionPulseRAF=requestAnimationFrame(pulseFrame);
    }
    regionPulseRAF=requestAnimationFrame(pulseFrame);
  }
  // Region focus function - callable from legend clicks and planet selection
  window.focusRegion=function(region, autoZoom){
    if(!region||region==='all'){
      activeRegion=null;
      document.querySelectorAll('#lg .li').forEach(el=>el.classList.remove('active'));
      PE.forEach(dot=>{dot.classList.remove('dimmed','focused');applyPlanetSize(dot,+dot.dataset.baseSize,'default')});
      drawRegionOutline(null);
      return;
    }
    activeRegion=region;
    document.querySelectorAll('#lg .li').forEach(el=>el.classList.remove('active'));
    const match=document.querySelector(`#lg .li[data-region="${region}"]`);
    if(match) match.classList.add('active');
    // Collect region planet positions for bounding box
    let mnX=Infinity,mnY=Infinity,mxX=-Infinity,mxY=-Infinity;
    PE.forEach(dot=>{
      if(dot.dataset.region===region){
        dot.classList.remove('dimmed');
        dot.classList.add('focused');
        applyPlanetSize(dot,+dot.dataset.baseSize,'focused');
        const dpx=parseFloat(dot.dataset.px),dpy=parseFloat(dot.dataset.py);
        mnX=Math.min(mnX,dpx);mnY=Math.min(mnY,dpy);
        mxX=Math.max(mxX,dpx);mxY=Math.max(mxY,dpy);
      } else {
        dot.classList.remove('focused');
        dot.classList.add('dimmed');
        // dimmed size handled by CSS !important override to 2px
      }
    });
    drawRegionOutline(region);
    // Auto zoom/pan to fit the region if triggered from legend click
    if(autoZoom && mnX<Infinity){
      const vp=document.getElementById('vp').getBoundingClientRect();
      const regionW=mxX-mnX+200, regionH=mxY-mnY+200;
      const centerX=(mnX+mxX)/2, centerY=(mnY+mxY)/2;
      const newSc=Math.min(vp.width/regionW, vp.height/regionH, 1.5);
      // Minimum scale ensures planet dots (14px focused) are clearly visible
      sc=Math.max(0.35, Math.min(newSc, 1.5));
      px=vp.width/2 - centerX*sc;
      py=vp.height/2 - centerY*sc;
      const mc=document.getElementById('mc');
      mc.style.transition='transform .6s cubic-bezier(.32,.72,0,1)';
      aT();uDV();
      setTimeout(()=>{mc.style.transition=''},650);
    }
  };
  document.querySelectorAll('#lg .li[data-region]').forEach(li=>{
    li.addEventListener('click',()=>{
      const region=li.dataset.region;
      // Close fact sheet and clear planet selection
      clrSel();
      if(region===activeRegion){
        // Clicking active region = deselect, turn show-all back on
        focusRegion(null);
        showAllToggle.classList.add('on');
        showAllOn=true;
        resetZoom();
      } else {
        // Selecting a region turns off show-all
        showAllToggle.classList.remove('on');
        showAllOn=false;
        focusRegion(region, true);
        window.starfieldBoost();
      }
    });
  });
  // Show All Planets toggle
  let showAllOn=true;
  const showAllToggle=document.getElementById('show-all-toggle');
  showAllToggle.addEventListener('click',()=>{
    showAllOn=!showAllOn;
    showAllToggle.classList.toggle('on',showAllOn);
    if(showAllOn){
      // Reset region focus, show all planets
      focusRegion(null);
      document.querySelectorAll('#lg .li[data-region]').forEach(el=>el.classList.remove('active'));
      resetZoom();
    }else{
      // Hide all planets
      PE.forEach(dot=>{dot.classList.add('dimmed');dot.classList.remove('focused')});
      drawRegionOutline(null);
    }
  });
  // Routes toggle
  let routesOn=false;
  const routeToggle=document.getElementById('routes-toggle');
  routeToggle.addEventListener('click',()=>{
    routesOn=!routesOn;
    routeToggle.classList.toggle('on',routesOn);
    if(routesOn){
      drawRoutes('all-routes');
    }else{
      stopRouteAnimation();
      const cv=document.getElementById('cv-routes');cv.width=CW;cv.height=CH;
      document.querySelectorAll('.route-label').forEach(el=>el.remove());
      // Close panel if showing a route
      const pn=document.getElementById('pn');
      if(pn&&ROUTES.some(r=>r.n===pn.textContent)){
        document.getElementById('dp').classList.remove('open');
      }
    }
  });
  function resetZoom(){
    const vp=document.getElementById('vp').getBoundingClientRect();
    sc=Math.min(vp.width,vp.height)/CW;
    px=(vp.width-CW*sc)/2;py=(vp.height-CH*sc)/2;
    const mc=document.getElementById('mc');
    mc.style.transition='transform .6s cubic-bezier(.32,.72,0,1)';
    aT();uDV();
    setTimeout(()=>{mc.style.transition=''},650);
  }
  // Disclosure group toggles
  document.querySelectorAll('.lg-header').forEach(h=>{
    h.addEventListener('click',()=>{
      const chev=h.querySelector('.lg-chevron');
      const body=h.nextElementSibling;
      chev.classList.toggle('open');
      body.classList.toggle('open');
    });
  });
  // Voice search setup
  (function setupMic(){
    const micBtn=document.getElementById('mic-btn');
    const si=document.getElementById('si');
    const sr=document.getElementById('sr');
    const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SpeechRecognition){
      micBtn.classList.add('disabled');
      return;
    }
    // Create recognition instance ONCE to avoid repeated permission prompts
    const recognition=new SpeechRecognition();
    recognition.lang='en-US';
    recognition.interimResults=true;
    recognition.continuous=true; // Keep session alive - no re-permission on restart
    recognition.maxAlternatives=1;
    let isRecording=false;
    let autoSearchTimer=null;
    let sessionStarted=false; // Track if we've started a session at all
    recognition.onresult=(e)=>{
      if(!isRecording)return; // Ignore results when "muted"
      let transcript='';
      for(let i=e.resultIndex;i<e.results.length;i++){transcript+=e.results[i][0].transcript}
      si.value=transcript;
      si.dispatchEvent(new Event('input'));
      if(e.results[e.results.length-1].isFinal){
        clearTimeout(autoSearchTimer);
        autoSearchTimer=setTimeout(()=>{
          stopRecording();
          const q=si.value.trim();
          if(q.length>=2){
            if(isQuestion(q)){aiSearch(q,si,sr)}
            else{
              const ql=q.toLowerCase();
              let matchIdx=S.findIndex(s=>s.SYSTEM.toLowerCase()===ql);
              if(matchIdx<0)matchIdx=S.findIndex(s=>s.SYSTEM.toLowerCase().startsWith(ql));
              if(matchIdx<0)matchIdx=S.findIndex(s=>s.SYSTEM.toLowerCase().includes(ql));
              if(matchIdx>=0){selSys(matchIdx);sr.style.display='none';si.value=S[matchIdx].SYSTEM}
              else{aiSearch(q,si,sr)}
            }
          }
        },1500);
      }
    };
    recognition.onerror=(e)=>{
      if(e.error==='not-allowed'){micBtn.classList.add('disabled');sessionStarted=false}
      else if(e.error!=='no-speech'){stopRecording()}
    };
    recognition.onend=()=>{
      // In continuous mode, session shouldn't end. If it does, restart silently.
      if(sessionStarted&&!micBtn.classList.contains('disabled')){
        try{recognition.start()}catch(e){}
      }
      if(isRecording){isRecording=false;micBtn.classList.remove('recording');si.placeholder='Search systems or ask a question...'}
    };
    function startRecording(){
      if(isRecording)return;
      isRecording=true;
      micBtn.classList.add('recording');
      si.placeholder='Listening...';
      si.value='';
      si.dispatchEvent(new Event('input'));
      if(!sessionStarted){
        try{recognition.start();sessionStarted=true}catch(e){stopRecording()}
      }
    }
    function stopRecording(){
      clearTimeout(autoSearchTimer);
      isRecording=false;
      micBtn.classList.remove('recording');
      si.placeholder='Search systems or ask a question...';
      // Don't stop the session - keep it alive to avoid re-permission
    }
    micBtn.addEventListener('click',(e)=>{
      e.preventDefault();
      if(isRecording){stopRecording()}else{startRecording()}
    });
    document.addEventListener('keydown',(e)=>{
      if((e.ctrlKey||e.metaKey)&&e.shiftKey&&e.key==='S'){
        e.preventDefault();
        if(isRecording){stopRecording()}else{startRecording()}
      }
    });
  })();
  const rect=document.getElementById('vp').getBoundingClientRect();
  sc=Math.min(rect.width,rect.height)/CW;px=(rect.width-CW*sc)/2;py=(rect.height-CH*sc)/2;aT();uDV();
  uL(100,'Systems online');await new Promise(r=>setTimeout(r,400));
  if(cleanupLoader)cleanupLoader();
  document.getElementById('ls').classList.add('fo');setTimeout(()=>document.getElementById('ls').remove(),800)}
init();


</script>
